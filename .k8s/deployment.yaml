apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app
  namespace: node-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-app
  template:
    metadata:
      labels:
        app: node-app
    spec:
      serviceAccountName: node-app-sa
      containers:
      - name: node-app
        image: imanyduc/node-simple-app:latest
        ports:
        - containerPort: 3000
