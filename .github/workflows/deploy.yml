name: Node.js CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: self-hosted

    steps:
    # -------------------------
    # 1️⃣ Checkout du repo
    # -------------------------
    - name: Checkout repo
      uses: actions/checkout@v3

    # -------------------------
    # 2️⃣ Setup Node.js
    # -------------------------
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    # -------------------------
    # 3️⃣ Installer dépendances
    # -------------------------
    - name: Install dependencies
      run: npm install

    # -------------------------
    # 4️⃣ Run tests
    # -------------------------
    - name: Run tests
      run: npm test || echo "No tests configured"

    # -------------------------
    # 5️⃣ Optionnel: start app
    # -------------------------
    - name: Start app (optional)
      run: npm start &

    # =========================
    # 6️⃣ CI/CD Docker
    # =========================

    - name: Set Docker tag
      run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

    # ⚡ Login Docker rapide (cache persistent sur runner)
    - name: Login to Docker Hub
      run: |
        mkdir -p $HOME/.docker
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      # Assure que Docker reste connecté sur le runner

    - name: Build Docker images
      run: |
        sudo docker build -t imanyduc/node-simple-app:latest .
        sudo docker build -t imanyduc/node-simple-app:${{ env.TAG }} .

    - name: Push Docker images
      run: |
        sudo docker push imanyduc/node-simple-app:latest
        sudo docker push imanyduc/node-simple-app:${{ env.TAG }}

    # =========================
    # 7️⃣ CI/CD K3s
    # =========================

    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'

    - name: Setup Kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 --decode > $HOME/.kube/config

    - name: Deploy to K3s
      run: |
        kubectl apply -f .k8s/namespace.yaml
        kubectl apply -f .k8s/sa.yaml
        kubectl apply -f .k8s/role.yaml
        kubectl apply -f .k8s/rolebinding.yaml
        kubectl apply -f .k8s/deployment.yaml
        kubectl apply -f .k8s/service.yaml