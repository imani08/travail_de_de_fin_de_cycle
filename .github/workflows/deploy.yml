name: Node.js CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test || echo "No tests configured"

    - name: Start app (optional)
      run: npm start &

    # =========================
    # AJOUT CI/CD DOCKER 👇
    # =========================

    - name: Set Docker tag
      run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Docker images
      run: |
        docker build -t imanyduc/node-simple-app:latest .
        docker build -t imanyduc/node-simple-app:${{ env.TAG }} .

    - name: Push Docker images
      run: |
        docker push imanyduc/node-simple-app:latest
        docker push imanyduc/node-simple-app:${{ env.TAG }}